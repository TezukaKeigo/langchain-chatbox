# ============================================================
# LangChain Chat — 全局配置文件
# ============================================================
# 说明：此文件管理非敏感的全局配置。
#       敏感信息（API Key、数据库密码）请通过 .env 配置。
# ============================================================

# ----- LLM 默认设置 -----
llm:
  # 默认模型（.env 中的 MODEL_NAME 优先于此配置）
  default_model: "deepseek-v4-flash"

  # API 调用超时（秒）
  timeout: 60

  # 最大重试次数
  max_retries: 3

  # 流式输出开关（TUI 环境建议开启）
  streaming: true

  # 支持的模型列表（用于运行时切换）
  # 每个模型可独立配置 API Key（env_key）和 Base URL（api_base_url）
  # 若 env_key 对应的环境变量未设置，回退到全局 API_KEY
  available_models:
    - name: "deepseek-v4-flash"
      provider: "deepseek"
      env_key: "DEEPSEEK_API_KEY"
      api_base_url: "https://api.deepseek.com/v1"
      description: "DeepSeek V4 Flash — 默认模型"
    - name: "kimi 2.6"
      provider: "moonshot"
      env_key: "KIMI_API_KEY"
      api_base_url: "https://api.moonshot.cn/v1"
      description: "Kimi 2.6 — Moonshot 出品"
    - name: "qwen-plus"
      provider: "alibaba"
      env_key: "QWEN_API_KEY"
      api_base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      description: "Qwen-Plus — 阿里云通义千问"

# ----- 存储配置 -----
# 切换存储后端：只需修改 storage.type 字段
storage:
  # 存储类型：sqlite | mysql | file
  type: sqlite

  # SQLite 配置（type=sqlite 时生效）
  sqlite:
    # 数据库文件路径（相对于项目根目录）
    path: "data/sqlite/app.db"

  # MySQL 配置（type=mysql 时生效）
  # 敏感信息（host/port/user/password/database）从 .env 加载
  mysql:
    pool_size: 5                # 连接池大小
    pool_recycle: 3600          # 连接回收时间（秒）

  # 文件系统配置（type=file 时生效）
  file:
    # 数据存储根目录
    path: "data/file_storage"
    # 存储格式：json | yaml
    format: "json"

# ----- 会话默认设置 -----
session:
  # 会话标题最大长度（首条消息截取长度）
  title_max_length: 30

  # 历史会话列表每页显示数量
  list_page_size: 20

# ----- 导出设置 -----
export:
  # 导出文件存储路径模板
  # {username} — 用户名
  # {session_title} — 会话标题
  # {date} — 导出日期
  path_template: "data/users/{username}/exports/{session_title}_{date}.md"

# ----- 开发设置 -----
dev:
  # 调试模式（dev 环境默认开启）
  debug: false
