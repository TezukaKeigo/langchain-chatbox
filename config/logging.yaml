# ============================================================
# 日志配置文件
# ============================================================
# 使用方式：config_manager 读取此文件并传递给 Python logging 模块
# ============================================================

version: 1

# ----- 日志格式器 -----
formatters:
  # JSON 格式 — 生产环境、结构化日志分析
  json_format:
    format: '{"timestamp":"%(asctime)s","level":"%(levelname)s","logger":"%(name)s","module":"%(module)s","func":"%(funcName)s","line":%(lineno)d,"message":"%(message)s"}'
    datefmt: "%Y-%m-%dT%H:%M:%S"

  # 可读格式 — 开发环境、终端输出
  readable_format:
    format: "[%(asctime)s] [%(levelname)-8s] %(name)s — %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

# ----- 日志处理器 -----
handlers:
  # 控制台输出（开发环境）
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: readable_format
    stream: ext://sys.stdout

  # 文件输出 — 所有级别（生产环境）
  file_all:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json_format
    filename: logs/app.log
    maxBytes: 10485760          # 10MB
    backupCount: 10
    encoding: utf-8

  # 文件输出 — 仅错误
  file_error:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: json_format
    filename: logs/error.log
    maxBytes: 5242880           # 5MB
    backupCount: 5
    encoding: utf-8

# ----- 日志记录器 -----
loggers:
  # 项目根日志器
  langchain_chat:
    level: DEBUG
    handlers: [console, file_all, file_error]
    propagate: false

  # LangChain 内部日志（减少噪音）
  langchain:
    level: WARNING
    handlers: [console]
    propagate: false

  # aiosqlite 日志
  aiosqlite:
    level: WARNING
    handlers: [console]
    propagate: false

# ----- 根日志器 -----
root:
  level: INFO
  handlers: [console]
